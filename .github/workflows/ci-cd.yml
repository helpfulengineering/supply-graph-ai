name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.12"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality (format, lint, repo-map)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install tooling and dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff black
          pip install -r requirements.txt

      - name: Ruff lint
        run: |
          ruff check src tests

      - name: Black format check
        run: |
          black --check src tests

      - name: Verify repository map is up to date
        run: |
          python scripts/generate_repo_map.py
          git diff --exit-code .repo-map.md

  test:
    name: Test (stable CI subset)
    runs-on: ubuntu-latest
    needs: quality
    env:
      ENVIRONMENT: test
      LOG_LEVEL: INFO
      STORAGE_PROVIDER: local
      LLM_ENABLED: false
      RUN_AZURE_CHAIN_TESTS: "0"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio

      - name: Run pytest
        run: |
          pytest tests \
            --ignore=tests/demo \
            --ignore=tests/e2e \
            --ignore=tests/integration/test_cloud_run_e2e.py \
            --ignore=tests/test_storage_to_okw_list_chain.py \
            -m "not llm" \
            --maxfail=1 \
            --cov=src \
            --cov-report=xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  security:
    name: Security (dependency and static checks)
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies and security tools
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pip-audit bandit

      - name: Dependency vulnerability scan
        run: |
          pip-audit -r requirements.txt
          if [ -f requirements-dev.txt ]; then
            pip-audit -r requirements-dev.txt
          fi

      - name: Static security scan
        run: |
          bandit -q -r src -x tests
