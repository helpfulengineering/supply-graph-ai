repos:
  - repo: https://github.com/psf/black
    rev: 26.3.1
    hooks:
      - id: black
        args: ["--config=pyproject.toml"]

  - repo: local
    hooks:
      - id: update-repo-map
        name: update repository map
        entry: bash -c 'python scripts/generate_repo_map.py && git add .repo-map.md'
        language: system
        pass_filenames: false
        always_run: true
